name: notify-release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      watch_repo:
        description: '監視対象 repo (owner/repo)。空なら openai/codex'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: notify-release
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      # 2026-06 強制移行までに Node 24 で動作確認するため前倒し
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run notifier
        env:
          WATCH_REPO: ${{ inputs.watch_repo != '' && inputs.watch_repo || 'openai/codex' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_release.py

      - name: Commit updated state
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            TAG=$(cat state/last_release.txt)
            git add state/
            git commit -m "[ops] last_release を ${TAG} に更新"
            git push
          fi

      - name: Notify failure to Discord
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(printf '{"content":"⚠️ codex-update-watcher の workflow が失敗しました\\n%s"}' "$RUN_URL")
          curl -sS -X POST -H 'Content-Type: application/json' -A 'codex-update-watcher' -d "$PAYLOAD" "$WEBHOOK" || true
